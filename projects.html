<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta name="description" content="Projects — Alejandro Medina" />
  <title>Projects | Alejandro Medina</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;500;600;700;800&family=DM+Mono:wght@300;400;500&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">
  <style>
/* ============================================================
   Alejandro Medina — Personal Site
   style.css  |  Design: dark navy + teal accent
   ============================================================ */


/* ── Reset ── */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html { scroll-behavior: smooth; font-size: 16px; }

/* ── Design Tokens ── */
:root {
  --bg:          #0b0c10;
  --bg2:         #0e0f15;
  --surface:     #13151e;
  --surface2:    #181a25;
  --surface3:    #1e2030;
  --border:      rgba(255,255,255,.06);
  --border2:     rgba(255,255,255,.10);
  --teal:        #00c8a0;
  --teal-dim:    rgba(0,200,160,.12);
  --teal-glow:   rgba(0,200,160,.18);
  --text:        #f0f1f5;
  --text2:       #8a8fa8;
  --text3:       #555a72;
  --muted:       #4a4f66;

  --syne:  'Syne', sans-serif;
  --mono:  'DM Mono', monospace;
  --inter: 'Inter', sans-serif;

  --r-sm: 12px;
  --r:    18px;
  --r-lg: 24px;
  --max:  1100px;
  --col:  min(92vw, var(--max));
  --nav-h: 64px;
}

body {
  background: var(--bg);
  color: var(--text);
  font-family: var(--inter);
  font-size: 15px;
  line-height: 1.65;
  -webkit-font-smoothing: antialiased;
}

a { color: inherit; text-decoration: none; transition: color .15s, opacity .15s; }
img { max-width: 100%; display: block; }

/* ── Layout ── */
.container { width: var(--col); margin-inline: auto; }

/* ── Nav ── */
.site-header {
  position: fixed;
  top: 0; left: 0; right: 0;
  z-index: 300;
  height: var(--nav-h);
  background: rgba(11,12,16,.75);
  backdrop-filter: blur(20px);
  -webkit-backdrop-filter: blur(20px);
  border-bottom: 1px solid var(--border);
}
.nav {
  display: flex;
  align-items: center;
  justify-content: space-between;
  height: var(--nav-h);
}
.brand {
  font-family: var(--syne);
  font-size: .92rem;
  font-weight: 700;
  letter-spacing: .01em;
  color: var(--text);
}
.brand:hover { color: var(--teal); }

.nav-links { display: flex; gap: 2.2rem; align-items: center; }
.nav-links a {
  font-family: var(--inter);
  font-size: .82rem;
  font-weight: 400;
  color: var(--text2);
  letter-spacing: .02em;
  transition: color .15s;
}
.nav-links a:hover,
.nav-links a[aria-current="page"] { color: var(--teal); }

/* ── Buttons ── */
.btn {
  display: inline-flex; align-items: center; gap: .4rem;
  padding: .55rem 1.3rem;
  border-radius: 8px;
  font-family: var(--inter);
  font-size: .8rem;
  font-weight: 500;
  border: 1px solid var(--border2);
  background: var(--surface2);
  color: var(--text2);
  cursor: pointer;
  transition: border-color .15s, color .15s, background .15s;
  white-space: nowrap;
}
.btn:hover { border-color: var(--teal); color: var(--teal); background: var(--teal-dim); }
.btn.primary {
  background: var(--teal);
  color: #0b0c10;
  border-color: var(--teal);
  font-weight: 600;
}
.btn.primary:hover { background: #00b891; border-color: #00b891; color: #0b0c10; }

/* ── Hero ── */
.hero {
  min-height: 100vh;
  padding-top: var(--nav-h);
  display: flex;
  align-items: center;
}
.hero-inner {
  width: var(--col);
  margin-inline: auto;
  display: grid;
  grid-template-columns: 1fr 340px;
  gap: 2rem;
  align-items: center;
  padding: 3rem 0 4rem;
}

/* Avatar / photo badge */
.hero-badge {
  display: inline-flex;
  align-items: center;
  gap: .6rem;
  background: var(--surface2);
  border: 1px solid var(--border2);
  border-radius: 100px;
  padding: .35rem .9rem .35rem .45rem;
  margin-bottom: 1.8rem;
}
.hero-avatar {
  width: 28px; height: 28px;
  border-radius: 50%;
  background: var(--teal-dim);
  border: 1px solid var(--teal);
  display: flex; align-items: center; justify-content: center;
  font-family: var(--syne);
  font-size: .65rem;
  font-weight: 700;
  color: var(--teal);
  flex-shrink: 0;
}
.hero-badge-text {
  font-family: var(--mono);
  font-size: .7rem;
  color: var(--text2);
  letter-spacing: .04em;
}
.hero-badge-socials { display: flex; gap: .7rem; margin-left: .4rem; }
.hero-badge-socials a {
  font-family: var(--mono);
  font-size: .68rem;
  color: var(--text3);
  transition: color .15s;
}
.hero-badge-socials a:hover { color: var(--teal); }

.hero h1 {
  font-family: var(--syne);
  font-size: clamp(2.6rem, 5.5vw, 4rem);
  font-weight: 800;
  line-height: 1.08;
  letter-spacing: -.02em;
  color: var(--text);
  margin-bottom: 1.3rem;
}
.hero h1 em {
  font-style: normal;
  color: var(--teal);
}

.hero-sub {
  font-size: .95rem;
  color: var(--text2);
  max-width: 50ch;
  margin-bottom: 2rem;
  line-height: 1.75;
}
.hero-sub strong { color: var(--text); font-weight: 500; }

.hero-cta { display: flex; gap: .7rem; flex-wrap: wrap; margin-bottom: 2.5rem; }

.chips { display: flex; flex-wrap: wrap; gap: .35rem; }
.chip {
  font-family: var(--mono);
  font-size: .65rem;
  letter-spacing: .05em;
  padding: .22rem .65rem;
  border-radius: 100px;
  background: var(--surface2);
  color: var(--text3);
  border: 1px solid var(--border);
}

/* ── Photo card (right column) ── */
.photo-card {
  background: var(--surface);
  border: 1px solid var(--border2);
  border-radius: var(--r-lg);
  overflow: hidden;
  aspect-ratio: 3/4;
  display: flex;
  align-items: center;
  justify-content: center;
  position: relative;
}
.photo-card img {
  width: 100%;
  height: 100%;
  object-fit: cover;
  object-position: top center;
}
.photo-placeholder {
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: .8rem;
  color: var(--text3);
  text-align: center;
  padding: 2rem;
}
.photo-placeholder-icon {
  width: 64px; height: 64px;
  border-radius: 50%;
  background: var(--surface2);
  border: 2px dashed var(--border2);
  display: flex; align-items: center; justify-content: center;
  font-size: 1.4rem;
}
.photo-placeholder p {
  font-family: var(--mono);
  font-size: .7rem;
  letter-spacing: .06em;
  color: var(--text3);
}

/* ── Bottom hero strip ── */
.hero-strip {
  padding: 0 0 4rem;
}
.hero-strip-inner {
  width: var(--col);
  margin-inline: auto;
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 1rem;
}
.strip-card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--r);
  padding: 1.6rem 1.8rem;
  transition: border-color .2s, background .2s;
}
.strip-card:hover { border-color: var(--border2); background: var(--surface2); }
.strip-card-label {
  font-family: var(--mono);
  font-size: .65rem;
  letter-spacing: .14em;
  color: var(--teal);
  text-transform: uppercase;
  margin-bottom: .6rem;
}
.strip-card h3 {
  font-family: var(--syne);
  font-size: 1rem;
  font-weight: 700;
  color: var(--text);
  margin-bottom: .3rem;
}
.strip-card p { font-size: .85rem; color: var(--text2); }

/* ── Sections ── */
.section {
  padding: 5rem 0;
  border-top: 1px solid var(--border);
}
.section-head { margin-bottom: 2.8rem; }
.section-kicker {
  font-family: var(--mono);
  font-size: .68rem;
  letter-spacing: .18em;
  color: var(--teal);
  text-transform: uppercase;
  margin-bottom: .5rem;
}
.section-head h2 {
  font-family: var(--syne);
  font-size: clamp(1.7rem, 3vw, 2.4rem);
  font-weight: 800;
  line-height: 1.1;
  letter-spacing: -.02em;
  color: var(--text);
  margin-bottom: .5rem;
}
.section-head p { font-size: .92rem; color: var(--text2); max-width: 58ch; }

.section-head-row {
  display: flex; justify-content: space-between;
  align-items: flex-end; flex-wrap: wrap; gap: 1rem;
}
.see-more {
  font-family: var(--mono); font-size: .72rem;
  letter-spacing: .08em; color: var(--teal);
  white-space: nowrap;
}
.see-more:hover { opacity: .7; }

/* ── Cards ── */
.card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--r);
  padding: 1.6rem;
  transition: border-color .2s, background .2s;
}
.card:hover { border-color: var(--border2); }

.grid.three {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 1rem;
}

/* ── Project cards ── */
.card.project {
  display: flex; flex-direction: column; gap: .8rem;
  background: var(--surface);
}
.project-top h3 {
  font-family: var(--syne);
  font-size: 1rem;
  font-weight: 700;
  color: var(--text);
  margin-bottom: .2rem;
}
.project-top .muted { font-size: .8rem; color: var(--text2); }
.card.project p { font-size: .85rem; color: var(--text2); flex: 1; }

.meta { display: flex; flex-wrap: wrap; gap: .3rem; }
.tag {
  font-family: var(--mono);
  font-size: .62rem;
  letter-spacing: .06em;
  padding: .15rem .55rem;
  border-radius: 100px;
  background: var(--surface2);
  color: var(--text3);
  border: 1px solid var(--border);
}
.actions { display: flex; gap: .6rem; margin-top: auto; }
.link {
  font-family: var(--mono);
  font-size: .7rem;
  letter-spacing: .06em;
  color: var(--teal);
  transition: opacity .15s;
}
.link:hover { opacity: .7; }

/* ── Publications ── */
.card h3 {
  font-family: var(--mono);
  font-size: .68rem;
  letter-spacing: .14em;
  text-transform: uppercase;
  color: var(--text3);
  margin-bottom: 1rem;
}
.pubs {
  list-style: decimal; padding-left: 1.3rem;
  display: flex; flex-direction: column; gap: 1rem;
}
.pubs li { font-size: .85rem; color: var(--text2); line-height: 1.65; }
.pub-authors { color: var(--text); }
.pub-title { color: var(--text); font-style: italic; }
.pub-title.link-title { color: var(--teal); font-style: italic; }
.pub-venue { color: var(--text2); }

/* ── CV ── */
.cv-top { margin-bottom: 1rem; }
.cv-identity {
  display: flex; justify-content: space-between;
  align-items: center; flex-wrap: wrap; gap: 1rem;
}
.cv-name {
  font-family: var(--syne);
  font-size: 1.4rem;
  font-weight: 700;
  margin-bottom: .2rem;
}
.cv-line { font-size: .85rem; color: var(--text2); }
.cv-actions { display: flex; gap: .5rem; flex-wrap: wrap; }

.cv-accordion { display: flex; flex-direction: column; gap: .5rem; }
.cv-item {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--r-sm);
  overflow: hidden;
  transition: border-color .2s;
}
.cv-item[open] { border-color: var(--border2); }
.cv-item summary {
  display: flex; justify-content: space-between; align-items: center;
  padding: 1rem 1.4rem;
  cursor: pointer; list-style: none; user-select: none;
  transition: background .15s;
}
.cv-item summary:hover { background: var(--surface2); }
.cv-item summary::-webkit-details-marker { display: none; }
.cv-title {
  font-family: var(--syne);
  font-size: .82rem;
  font-weight: 600;
  letter-spacing: .04em;
  color: var(--text);
}
.cv-chev { color: var(--text3); font-size: .9rem; transition: transform .2s; }
.cv-item[open] .cv-chev { transform: rotate(180deg); }
.cv-content {
  padding: 1.2rem 1.4rem 1.4rem;
  border-top: 1px solid var(--border);
  display: flex; flex-direction: column; gap: 1.2rem;
}
.cv-entry { display: flex; flex-direction: column; gap: .4rem; }
.cv-entry-head {
  display: flex; justify-content: space-between;
  align-items: baseline; flex-wrap: wrap; gap: .4rem;
  font-size: .88rem;
}
.cv-entry-head strong { color: var(--text); font-weight: 500; }
.cv-entry-head .muted {
  font-family: var(--mono); font-size: .7rem;
  letter-spacing: .06em; color: var(--text2);
}
.cv-sub { font-size: .82rem; color: var(--text2); }
.cv-subhead {
  font-family: var(--mono); font-size: .65rem;
  letter-spacing: .14em; text-transform: uppercase;
  color: var(--teal); margin-bottom: .4rem;
}
.cv-split { display: grid; grid-template-columns: 1fr 1fr; gap: 1.2rem; }
.bullets {
  list-style: disc; padding-left: 1.2rem;
  display: flex; flex-direction: column; gap: .25rem;
}
.bullets li { font-size: .84rem; color: var(--text2); }

/* ── Contact ── */
.contact-card { display: flex; flex-direction: column; gap: 1.4rem; }
.contact-email { font-family: var(--syne); font-size: 1.5rem; font-weight: 700; }
.contact-email a { color: var(--text); transition: color .15s; }
.contact-email a:hover { color: var(--teal); }
.contact-buttons { display: flex; flex-wrap: wrap; gap: .5rem; }
.social-btn {
  display: inline-flex; align-items: center;
  padding: .4rem .9rem;
  border-radius: 8px;
  border: 1px solid var(--border2);
  background: var(--surface2);
  font-family: var(--mono);
  font-size: .7rem;
  letter-spacing: .06em;
  color: var(--text2);
  transition: border-color .15s, color .15s, background .15s;
}
.social-btn:hover { border-color: var(--teal); color: var(--teal); background: var(--teal-dim); }

/* ── Projects page controls ── */
.projects-controls {
  display: flex; gap: .6rem; margin-top: 2rem; justify-content: center;
}

/* ── Footer ── */
.footer {
  margin-top: 3rem; padding-top: 1.5rem;
  border-top: 1px solid var(--border);
  font-family: var(--mono);
  font-size: .7rem; letter-spacing: .06em;
  color: var(--text3);
}

/* ══════════════════════════════════════════════
   PERSONAL PAGE  (personal.html)
   ══════════════════════════════════════════════ */

.personal-hero {
  padding-top: calc(var(--nav-h) + 3rem);
  padding-bottom: 3rem;
  border-bottom: 1px solid var(--border);
}
.personal-hero h1 {
  font-family: var(--syne);
  font-size: clamp(2rem, 4vw, 3rem);
  font-weight: 800;
  letter-spacing: -.02em;
  color: var(--text);
  margin-bottom: .6rem;
}
.personal-hero p { font-size: .95rem; color: var(--text2); max-width: 60ch; }

/* Day cards grid */
.day-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(290px, 1fr));
  gap: 1rem;
  padding: 3rem 0;
}

.day-card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--r);
  overflow: hidden;
  display: flex;
  flex-direction: column;
  transition: border-color .2s, transform .2s;
  cursor: pointer;
}
.day-card:hover { border-color: var(--teal); transform: translateY(-2px); }
.day-card.rest-card { opacity: .5; cursor: default; }
.day-card.rest-card:hover { transform: none; border-color: var(--border); }

.day-card-header {
  padding: 1.1rem 1.3rem .8rem;
  display: flex;
  justify-content: space-between;
  align-items: flex-start;
  border-bottom: 1px solid var(--border);
}
.day-card-day {
  font-family: var(--syne);
  font-size: 1.4rem;
  font-weight: 800;
  letter-spacing: -.01em;
  color: var(--text);
  line-height: 1;
}
.day-card-date-sub {
  font-family: var(--mono);
  font-size: .62rem;
  letter-spacing: .1em;
  color: var(--text3);
  margin-top: .2rem;
}
.day-card-tag {
  font-family: var(--mono);
  font-size: .62rem;
  letter-spacing: .1em;
  padding: .2rem .65rem;
  border-radius: 100px;
  background: var(--teal-dim);
  color: var(--teal);
  border: 1px solid rgba(0,200,160,.25);
  white-space: nowrap;
  align-self: flex-start;
}
.day-card-tag.rest { background: var(--surface2); color: var(--text3); border-color: var(--border); }

.day-card-body {
  padding: 1rem 1.3rem;
  flex: 1;
  display: flex;
  flex-direction: column;
  gap: .8rem;
}
.day-card-focus {
  font-family: var(--syne);
  font-size: .88rem;
  font-weight: 700;
  color: var(--text);
  line-height: 1.3;
}
.day-card-goal {
  font-size: .78rem;
  color: var(--text2);
}
.day-card-run {
  display: inline-flex;
  align-items: center;
  gap: .4rem;
  font-family: var(--mono);
  font-size: .68rem;
  letter-spacing: .08em;
  color: var(--teal);
  background: var(--teal-dim);
  border: 1px solid rgba(0,200,160,.2);
  border-radius: 6px;
  padding: .25rem .65rem;
  align-self: flex-start;
}

/* Block list inside expanded day card */
.day-card-blocks { display: flex; flex-direction: column; gap: .35rem; }
.block-pill {
  display: flex;
  align-items: center;
  gap: .6rem;
  padding: .45rem .7rem;
  border-radius: 8px;
  background: var(--surface2);
  border: 1px solid var(--border);
}
.block-pill-dot {
  width: 6px; height: 6px;
  border-radius: 50%;
  flex-shrink: 0;
}
.dot-warmup  { background: var(--text3); }
.dot-main    { background: var(--teal); }
.dot-core    { background: #e05c5c; }

.block-pill-name {
  font-size: .78rem;
  color: var(--text2);
  flex: 1;
}
.block-pill-dur {
  font-family: var(--mono);
  font-size: .62rem;
  color: var(--text3);
  letter-spacing: .06em;
}

/* Modal overlay */
.modal-overlay {
  position: fixed; inset: 0; z-index: 500;
  background: rgba(11,12,16,.88);
  backdrop-filter: blur(12px);
  display: flex; align-items: center; justify-content: center;
  padding: 1rem;
  opacity: 0; pointer-events: none;
  transition: opacity .25s;
}
.modal-overlay.open { opacity: 1; pointer-events: all; }

.modal {
  background: var(--surface);
  border: 1px solid var(--border2);
  border-radius: var(--r-lg);
  width: 100%; max-width: 720px;
  max-height: 88vh;
  overflow-y: auto;
  transform: translateY(16px);
  transition: transform .25s;
}
.modal-overlay.open .modal { transform: translateY(0); }

.modal-header {
  padding: 1.4rem 1.6rem 1rem;
  border-bottom: 1px solid var(--border);
  position: sticky; top: 0;
  background: var(--surface);
  z-index: 1;
  display: flex; justify-content: space-between; align-items: flex-start;
}
.modal-close {
  background: var(--surface2); border: 1px solid var(--border2);
  border-radius: 8px; padding: .3rem .7rem;
  font-family: var(--mono); font-size: .7rem;
  color: var(--text2); cursor: pointer;
  transition: border-color .15s, color .15s;
}
.modal-close:hover { border-color: var(--teal); color: var(--teal); }

.modal-body { padding: 1.4rem 1.6rem; display: flex; flex-direction: column; gap: 1rem; }

/* Block accordion in modal */
.modal-block {
  background: var(--surface2);
  border: 1px solid var(--border);
  border-radius: var(--r-sm);
  overflow: hidden;
}
.modal-block summary {
  display: flex; justify-content: space-between; align-items: center;
  padding: .8rem 1rem;
  cursor: pointer; list-style: none; user-select: none;
  transition: background .15s;
}
.modal-block summary:hover { background: var(--surface3); }
.modal-block summary::-webkit-details-marker { display: none; }
.modal-block-name {
  display: flex; align-items: center; gap: .6rem;
  font-family: var(--syne); font-size: .8rem; font-weight: 600; color: var(--text);
}
.modal-block-dur {
  font-family: var(--mono); font-size: .65rem; color: var(--text3);
  letter-spacing: .06em; margin-left: .5rem;
}
.modal-chev { color: var(--text3); font-size: .8rem; transition: transform .2s; }
.modal-block[open] .modal-chev { transform: rotate(180deg); }

.ex-table { border-top: 1px solid var(--border); }
.ex-head {
  display: grid;
  grid-template-columns: 1fr 48px 100px 1fr;
  gap: .5rem; padding: .45rem 1rem;
  background: var(--bg2);
}
.ex-head span {
  font-family: var(--mono); font-size: .58rem;
  letter-spacing: .16em; color: var(--muted); text-transform: uppercase;
}
.ex-row {
  display: grid;
  grid-template-columns: 1fr 48px 100px 1fr;
  gap: .5rem; padding: .75rem 1rem;
  border-top: 1px solid var(--border);
  transition: background .12s;
}
.ex-row:hover { background: rgba(255,255,255,.02); }
.ex-name { font-size: .84rem; color: var(--text); font-weight: 500; line-height: 1.3; }
.ex-sets { font-family: var(--mono); font-size: .84rem; color: var(--teal); font-weight: 500; }
.ex-sets-core { color: #e05c5c; }
.ex-reps { font-size: .78rem; color: var(--text2); line-height: 1.4; }
.ex-notes { font-size: .74rem; color: var(--text3); line-height: 1.45; }

/* ── Responsive ── */
@media (max-width: 900px) {
  .hero-inner { grid-template-columns: 1fr; }
  .photo-card { display: none; }
  .hero-strip-inner { grid-template-columns: 1fr; }
  .grid.three { grid-template-columns: repeat(2, 1fr); }
  .cv-split { grid-template-columns: 1fr; }
  .ex-head, .ex-row { grid-template-columns: 1fr 44px 90px; }
  .ex-notes { display: none; }
  .day-grid { grid-template-columns: repeat(2, 1fr); }
}
@media (max-width: 560px) {
  .grid.three { grid-template-columns: 1fr; }
  .nav-links { gap: 1.2rem; }
  .nav-links a { font-size: .75rem; }
  .day-grid { grid-template-columns: 1fr; }
  .ex-head, .ex-row { grid-template-columns: 1fr 44px; }
  .ex-reps { display: none; }
}

/* ── Project Page Extras ── */

/* Year section header */
.year-section { margin-bottom: 2.5rem; }

.year-header {
  display: flex;
  align-items: center;
  gap: 1rem;
  margin-bottom: 1rem;
  cursor: pointer;
  user-select: none;
  padding: .5rem 0;
  border-bottom: 1px solid var(--border);
}
.year-header:hover .year-label { color: var(--teal); }

.year-label {
  font-family: var(--syne);
  font-size: 1.4rem;
  font-weight: 800;
  letter-spacing: -.02em;
  color: var(--text);
  transition: color .15s;
  flex: 1;
}
.year-count {
  font-family: var(--mono);
  font-size: .68rem;
  letter-spacing: .1em;
  color: var(--text3);
  background: var(--surface2);
  border: 1px solid var(--border);
  border-radius: 100px;
  padding: .15rem .6rem;
}
.year-toggle {
  font-size: .8rem;
  color: var(--text3);
  transition: transform .25s, color .15s;
  width: 20px;
  text-align: center;
}
.year-section.collapsed .year-toggle { transform: rotate(-90deg); }
.year-section.collapsed .year-grid { display: none; }

/* Year filter bar */
.filter-bar {
  display: flex;
  align-items: center;
  gap: .5rem;
  flex-wrap: wrap;
  margin-bottom: 2.8rem;
}
.filter-bar-label {
  font-family: var(--mono);
  font-size: .65rem;
  letter-spacing: .14em;
  color: var(--text3);
  text-transform: uppercase;
  margin-right: .3rem;
}
.year-filter-btn {
  font-family: var(--mono);
  font-size: .7rem;
  letter-spacing: .08em;
  padding: .3rem .8rem;
  border-radius: 100px;
  border: 1px solid var(--border2);
  background: var(--surface2);
  color: var(--text2);
  cursor: pointer;
  transition: all .15s;
}
.year-filter-btn:hover { border-color: var(--teal); color: var(--teal); }
.year-filter-btn.active { background: var(--teal); color: #0b0c10; border-color: var(--teal); font-weight: 600; }
.year-filter-btn.all { border-style: dashed; }

/* Pinned section */
.pinned-label {
  display: inline-flex;
  align-items: center;
  gap: .4rem;
  font-family: var(--mono);
  font-size: .65rem;
  letter-spacing: .14em;
  color: var(--teal);
  text-transform: uppercase;
  margin-bottom: 1rem;
}
.pinned-label::before {
  content: '📌';
  font-size: .75rem;
}

/* Project card title row */
.project-title-row {
  display: flex;
  align-items: flex-start;
  justify-content: space-between;
  gap: .6rem;
  margin-bottom: .2rem;
}
.project-title-row h3 {
  font-family: var(--syne);
  font-size: 1rem;
  font-weight: 700;
  color: var(--text);
  line-height: 1.25;
  flex: 1;
}
.pub-star {
  font-size: 1rem;
  line-height: 1;
  flex-shrink: 0;
  margin-top: .05rem;
}

/* Conference tag (red family, top of card) */
.conf-tag {
  display: inline-flex;
  align-items: center;
  gap: .3rem;
  font-family: var(--mono);
  font-size: .6rem;
  letter-spacing: .1em;
  padding: .18rem .6rem;
  border-radius: 100px;
  white-space: nowrap;
  font-weight: 500;
}
.conf-tag.published {
  background: rgba(220, 70, 70, .13);
  color: #e8736b;
  border: 1px solid rgba(220, 70, 70, .25);
}
.conf-tag.review {
  background: rgba(200, 140, 50, .12);
  color: #d4956a;
  border: 1px solid rgba(200, 140, 50, .22);
}
.conf-tag.presented {
  background: rgba(130, 80, 220, .13);
  color: #a07ee8;
  border: 1px solid rgba(130, 80, 220, .22);
}

/* Year badge on card */
.card-year-badge {
  font-family: var(--mono);
  font-size: .6rem;
  letter-spacing: .1em;
  color: var(--text3);
  background: var(--surface2);
  border: 1px solid var(--border);
  border-radius: 4px;
  padding: .1rem .45rem;
  margin-bottom: .6rem;
  display: inline-block;
}

/* Card top meta row */
.card-top-meta {
  display: flex;
  align-items: center;
  gap: .4rem;
  flex-wrap: wrap;
  margin-bottom: .5rem;
}

/* Search box */
.search-box {
  display: flex;
  align-items: center;
  gap: .8rem;
  background: var(--surface);
  border: 1px solid var(--border2);
  border-radius: 10px;
  padding: .55rem 1rem;
  margin-bottom: 1rem;
  transition: border-color .15s;
  flex: 1;
  max-width: 320px;
}
.search-box:focus-within { border-color: var(--teal); }
.search-box input {
  background: none;
  border: none;
  outline: none;
  font-family: var(--inter);
  font-size: .85rem;
  color: var(--text);
  width: 100%;
}
.search-box input::placeholder { color: var(--text3); }
.search-icon { color: var(--text3); font-size: .85rem; flex-shrink: 0; }

.filter-row {
  display: flex;
  gap: 1rem;
  align-items: center;
  flex-wrap: wrap;
  margin-bottom: 2.5rem;
}

/* Collapse all button */
.collapse-all-btn {
  font-family: var(--mono);
  font-size: .68rem;
  letter-spacing: .08em;
  padding: .3rem .8rem;
  border-radius: 6px;
  border: 1px solid var(--border2);
  background: transparent;
  color: var(--text3);
  cursor: pointer;
  transition: all .15s;
  margin-left: auto;
}
.collapse-all-btn:hover { border-color: var(--border2); color: var(--text2); }

/* No results */
.no-results {
  text-align: center;
  padding: 4rem 2rem;
  color: var(--text3);
  font-family: var(--mono);
  font-size: .8rem;
  letter-spacing: .06em;
  display: none;
}
.no-results.visible { display: block; }

  </style>
</head>

<body>
  <header class="site-header">
    <div class="container">
      <nav class="nav">
        <a class="brand" href="index.html">Alejandro Medina</a>
        <div class="nav-links">
          <a href="projects.html" aria-current="page">Projects</a>
          <a href="cv.html">CV</a>
          <a href="personal.html">Personal</a>
          <a href="index.html#contact">Contact</a>
        </div>
      </nav>
    </div>
  </header>

  <main>
    <section class="section" style="padding-top:calc(var(--nav-h) + 3rem);">
      <div class="container">

        <div class="section-head">
          <p class="section-kicker">Work</p>
          <h2>Projects</h2>
          <p>Research and engineering across Quality Diversity, bioinformatics, and interactive systems. ⭐ = publication &nbsp;|&nbsp; 🎤 = presentation</p>
        </div>

        <!-- Pinned -->
        <div id="pinnedSection">
          <div class="pinned-label">Pinned</div>
          <div class="grid three" id="pinnedGrid"></div>
        </div>

        <hr style="border:none;border-top:1px solid var(--border);margin:2.5rem 0;" />

        <!-- Filter row -->
        <div class="filter-row">
          <div class="search-box">
            <span class="search-icon">🔍</span>
            <input type="text" id="searchInput" placeholder="Search projects..." autocomplete="off" />
          </div>
          <div class="filter-bar" id="filterBar">
            <span class="filter-bar-label">Year</span>
          </div>
          <button class="collapse-all-btn" id="collapseAllBtn">Collapse all ▾</button>
        </div>

        <!-- Year sections (injected by JS) -->
        <div id="yearSections"></div>
        <div class="no-results" id="noResults">No projects match your search.</div>

      </div>
    </section>
  </main>

  <script>
  // ── LEGEND ───────────────────────────────────────────────────
  // publication: { venue, type: 'published'|'review'|'presented', emoji: 📄|⏳|🎤 }
  // pinned: true → appears in pinned section AND year section
  // star: true → gets ⭐ next to title

  const PROJECTS = [
    // ── 2026 ──
    {
      year: 2026,
      title: "Motif Diversity in Human CTCF ChIP-seq Data Using MAP-Elites",
      subtitle: "MAP-Elites for DNA motif hypothesis spaces",
      desc: "Framing DNA motif discovery as a quality-diversity problem to recover multiple high-quality motif hypotheses. Compared against standard motif discovery tools under matched criteria.",
      tags: ["Bioinformatics", "MAP-Elites", "Genomics"],
      pinned: true,
      publication: { venue: "GECCO 2026", type: "published", emoji: "⭐" },
      links: [{ label: "Preprint →", href: "https://arxiv.org/abs/2601.17808" }]
    },
    {
      year: 2026,
      title: "MAS-QD",
      subtitle: "Multi-Archive Scheduling for Robust Illumination",
      desc: "A scheduler coordinating multiple QD archives and emitters to improve illumination robustness across complementary descriptor views.",
      tags: ["QD", "Scheduling", "Multi-View"],
      links: []
    },
    {
      year: 2026,
      title: "Illuminating Recommendation Spaces",
      subtitle: "QD perspective on recommender trade-offs",
      desc: "Using illumination algorithms to map diverse, high-performing recommendation policies — characterizing accuracy–diversity–fairness trade-offs across the archive.",
      tags: ["Recsys", "QD", "Trade-offs"],
      links: []
    },
    {
      year: 2026,
      title: "QD Archives as Design Databases",
      subtitle: "Human-queryable archives for design exploration",
      desc: "Treating quality-diversity archives as structured design databases that humans can query, annotate, and navigate for creative and scientific exploration.",
      tags: ["HCI", "QD", "Design"],
      links: []
    },
    {
      year: 2026,
      title: "Human-in-the-Loop Adaptive QD",
      subtitle: "Interactive querying and archive exploration",
      desc: "UI and interaction primitives for exploring QD archives — slicing, annotation, comparisons — to support scientific and design interpretation.",
      tags: ["HCI", "Visualization", "QD"],
      links: []
    },
    {
      year: 2026,
      title: "Alcohol Consumption & Clustering",
      subtitle: "Unsupervised phenotyping of drinking behavior",
      desc: "Clustering approaches to identify latent phenotypes in alcohol consumption data across nonhuman primate cohorts.",
      tags: ["ML", "Clustering", "Bioinformatics"],
      links: []
    },
    {
      year: 2026,
      title: "Evolutionary Computation & Graph Pruning",
      subtitle: "EC-driven sparse graph optimization",
      desc: "Applying evolutionary search to structured graph pruning tasks, exploring how QD and EC approaches compare to gradient-based pruning methods.",
      tags: ["Evolutionary Computation", "Graphs", "Optimization"],
      links: []
    },
    // ── 2025 ──
    {
      year: 2025,
      title: "Revisiting Predictive Models of Alcohol Consumption in Nonhuman Primates",
      subtitle: "Predictive modeling of behavioral trajectories",
      desc: "ML analysis of alcohol-intake trajectory classifications in nonhuman primates, evaluating stability and predictive validity across modeling approaches.",
      tags: ["ML", "Time Series", "Bioinformatics"],
      pinned: true,
      publication: { venue: "AI4BM Symposium 2025", type: "presented", emoji: "🎤" },
      links: []
    },
    {
      year: 2025,
      title: "Strategic Diversity in Settlers of Catan",
      subtitle: "QD for multi-strategy board game AI",
      desc: "Using quality-diversity search to discover a diverse archive of distinct high-performing strategies in Settlers of Catan.",
      tags: ["QD", "Game AI", "Strategy"],
      links: []
    },
    {
      year: 2025,
      title: "Robust Strategy Optimization with PSO",
      subtitle: "Particle Swarm Optimization for adversarial robustness",
      desc: "Applying PSO to discover strategies robust to opponent variation, combining swarm intelligence with quality-diversity objectives.",
      tags: ["PSO", "Optimization", "Robustness"],
      links: []
    },
    // ── 2024 ──
    {
      year: 2024,
      title: "SNITCH",
      subtitle: "Southwestern's Newest Innovation to Cultivate Honor",
      desc: "An anonymous, AI-assisted honor code reporting system designed to increase reporting rates while protecting student psychological safety.",
      tags: ["HCI", "Systems", "Ethics"],
      publication: { venue: "CCSC 2024 (3rd Place Poster Competition)", type: "presented", emoji: "🎤" },
      links: []
    },
    // ── 2023 ──
    {
      year: 2023,
      title: "Evolving Flying Machines in Minecraft Using Quality Diversity",
      subtitle: "Quality Diversity for creative AI in Minecraft",
      desc: "MAP-Elites-based algorithms for evolving flying machines in Minecraft with custom behavioral descriptors.",
      tags: ["QD", "Creative AI", "Neuroevolution"],
      pinned: true,
      publication: { venue: "GECCO 2023", type: "published", emoji: "⭐" },
      links: [{ label: "Paper →", href: "https://dl.acm.org/doi/10.1145/3583131.3590352" }]
    },
    {
      year: 2023,
      title: "Using Quality Diversity to Evolve Flying Machines in Minecraft",
      subtitle: "Quality Diversity for creative AI in Minecraft",
      desc: "MAP-Elites-based algorithms for evolving flying machines in Minecraft with custom behavioral descriptors.",
      tags: ["Quality Diversity", "Creative AI", "Evolutionary Computation"],
      publication: { venue: "CCSC 2023 (3rd Place Poster Competition)", type: "presented", emoji: "🎤" },
      links: []
    },
    {
      year: 2023,
      title: "Interactive Evolution of Novel Shapes in Minecraft",
      subtitle: "Human-in-the-loop creative evolution",
      desc: "Interactive evolutionary approach allowing users to guide the evolution of novel voxel shapes in Minecraft using aesthetic preference.",
      tags: ["Interactive Evolution", "Creative AI", "HCI"],
      publication: { venue: "CCSC 2023 (Honorable Mention Poster Competition)", type: "presented", emoji: "🎤" },
      links: []
    },
    {
      year: 2023,
      title: "Evaluating an Earliest Deadline First Algorithm for a Dial-a-Ride Problem",
      subtitle: "EDF Algorithm for scheduling with time windows",
      desc: "Algorithmic benchmark and comparison between various existing scheduling algorithms and an earliest deadline first approach (EDF).",
      tags: ["Algorithms", "Scheduling", "Benchmark"],
      star: true,
      publication: { venue: "Tapia 2023", type: "presented", emoji: "🎤" },
      links: [{ label: "Code →", href: "https://github.com/alejmedinajr/ImplementingEDF" }]
    },
    // ── 2022 ──
    {
      year: 2022,
      title: "Prioritizing Self, Team, or Job: Trends in Sincerity in Cooperative Polls",
      subtitle: "Cooperative polls & sincerity in scheduling",
      desc: "Analysis of trends in sincerity across a human study of US respondents when prioritizing self, team, or job in cooperative scheduling polls.",
      tags: ["Analysis", "HCI", "Voting Theory"],
      pinned: false,
      star: true,
      publication: { venue: "CDVE 2022", type: "published", emoji: "⭐" },
      links: [{ label: "Paper →", href: "https://link.springer.com/chapter/10.1007/978-3-031-16538-2_4" }]
    },
  ];

  // ── Helpers ──────────────────────────────────────────────────
  function confTagHTML(pub) {
    if (!pub) return '';
    return `<span class="conf-tag ${pub.type}">${pub.emoji} ${pub.venue}</span>`;
  }

  function cardHTML(p, showYearBadge = false) {
    const tags  = (p.tags  || []).map(t => `<span class="tag">${t}</span>`).join('');
    const links = (p.links || []).map(l => `<a class="link" href="${l.href}" target="_blank" rel="noreferrer">${l.label}</a>`).join('');
    const yearBadge = showYearBadge ? `<span class="card-year-badge">${p.year}</span>` : '';
    const confTag = confTagHTML(p.publication);

    return `
      <article class="card project" data-year="${p.year}" data-title="${p.title.toLowerCase()}" data-tags="${(p.tags||[]).join(' ').toLowerCase()}">
        <div>
          ${yearBadge}
          <div class="card-top-meta">
            ${confTag}
          </div>
          <div class="project-title-row">
            <h3>${p.title}</h3>
            ${p.star ? '<span class="pub-star" title="Led to publication or presentation">⭐</span>' : ''}
          </div>
          ${p.subtitle ? `<p class="muted" style="font-size:.8rem;margin-bottom:.4rem;">${p.subtitle}</p>` : ''}
        </div>
        <p>${p.desc || ''}</p>
        <div class="meta">${tags}</div>
        ${links ? `<div class="actions">${links}</div>` : ''}
      </article>
    `;
  }

  // ── Pinned Section ───────────────────────────────────────────
  function renderPinned() {
    const pinned = PROJECTS.filter(p => p.pinned);
    document.getElementById('pinnedGrid').innerHTML = pinned.map(p => cardHTML(p, true)).join('');
  }

  // ── Year Sections ─────────────────────────────────────────────
  let allCollapsed = false;

  function getYears() {
    return [...new Set(PROJECTS.map(p => p.year))].sort((a, b) => b - a);
  }

  function renderYearFilters(years) {
    const bar = document.getElementById('filterBar');
    const allBtn = `<button class="year-filter-btn all active" data-year="all" onclick="filterYear('all',this)">All</button>`;
    const yearBtns = years.map(y =>
      `<button class="year-filter-btn" data-year="${y}" onclick="filterYear(${y},this)">${y}</button>`
    ).join('');
    bar.innerHTML = `<span class="filter-bar-label">Year</span>${allBtn}${yearBtns}`;
  }

  function renderYearSections(filterYear = 'all', searchQuery = '') {
    const years = getYears();
    const container = document.getElementById('yearSections');
    const query = searchQuery.toLowerCase().trim();

    let totalVisible = 0;

    container.innerHTML = years.map(year => {
      if (filterYear !== 'all' && filterYear !== year) return '';

      const projects = PROJECTS.filter(p => {
        if (p.year !== year) return false;
        if (!query) return true;
        return (
          p.title.toLowerCase().includes(query) ||
          (p.subtitle || '').toLowerCase().includes(query) ||
          (p.tags || []).join(' ').toLowerCase().includes(query) ||
          (p.publication?.venue || '').toLowerCase().includes(query)
        );
      });

      if (!projects.length) return '';
      totalVisible += projects.length;

      const sectionId = `year-${year}`;
      const cards = projects.map(p => cardHTML(p)).join('');

      return `
        <div class="year-section" id="${sectionId}">
          <div class="year-header" onclick="toggleYear('${sectionId}')">
            <span class="year-label">${year}</span>
            <span class="year-count">${projects.length} project${projects.length !== 1 ? 's' : ''}</span>
            <span class="year-toggle">▾</span>
          </div>
          <div class="year-grid grid three">${cards}</div>
        </div>
      `;
    }).join('');

    const noResults = document.getElementById('noResults');
    noResults.classList.toggle('visible', totalVisible === 0);
  }

  // ── Interactions ─────────────────────────────────────────────
  let activeYear = 'all';
  let searchQuery = '';

  function filterYear(year, btn) {
    activeYear = year;
    document.querySelectorAll('.year-filter-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    renderYearSections(activeYear, searchQuery);
  }

  function toggleYear(sectionId) {
    const section = document.getElementById(sectionId);
    if (section) section.classList.toggle('collapsed');
  }

  document.getElementById('collapseAllBtn').addEventListener('click', function() {
    allCollapsed = !allCollapsed;
    document.querySelectorAll('.year-section').forEach(s => {
      s.classList.toggle('collapsed', allCollapsed);
    });
    this.textContent = allCollapsed ? 'Expand all ▸' : 'Collapse all ▾';
  });

  document.getElementById('searchInput').addEventListener('input', function() {
    searchQuery = this.value;
    renderYearSections(activeYear, searchQuery);
  });

  // ── Init ─────────────────────────────────────────────────────
  renderPinned();
  renderYearFilters(getYears());
  renderYearSections();
  </script>
</body>
