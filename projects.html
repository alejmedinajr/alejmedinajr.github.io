<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta name="description" content="Projects — Alejandro Medina" />
  <title>Projects | Alejandro Medina</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;500;600;700;800&family=DM+Mono:wght@300;400;500&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">
  <style>
/* ============================================================
   Alejandro Medina — Personal Site
   style.css  |  Design: dark navy + teal accent
   ============================================================ */


/* ── Reset ── */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html { scroll-behavior: smooth; font-size: 16px; }

/* ── Design Tokens ── */
:root {
  --bg:          #0b0c10;
  --bg2:         #0e0f15;
  --surface:     #13151e;
  --surface2:    #181a25;
  --surface3:    #1e2030;
  --border:      rgba(255,255,255,.06);
  --border2:     rgba(255,255,255,.10);
  --teal:        #00c8a0;
  --teal-dim:    rgba(0,200,160,.12);
  --teal-glow:   rgba(0,200,160,.18);
  --text:        #f0f1f5;
  --text2:       #8a8fa8;
  --text3:       #555a72;
  --muted:       #4a4f66;

  --syne:  'Syne', sans-serif;
  --mono:  'DM Mono', monospace;
  --inter: 'Inter', sans-serif;

  --r-sm: 12px;
  --r:    18px;
  --r-lg: 24px;
  --max:  1100px;
  --col:  min(92vw, var(--max));
  --nav-h: 64px;
}

body {
  background: var(--bg);
  color: var(--text);
  font-family: var(--inter);
  font-size: 15px;
  line-height: 1.65;
  -webkit-font-smoothing: antialiased;
}

a { color: inherit; text-decoration: none; transition: color .15s, opacity .15s; }
img { max-width: 100%; display: block; }

/* ── Layout ── */
.container { width: var(--col); margin-inline: auto; }

/* ── Nav ── */
.site-header {
  position: fixed;
  top: 0; left: 0; right: 0;
  z-index: 300;
  height: var(--nav-h);
  background: rgba(11,12,16,.75);
  backdrop-filter: blur(20px);
  -webkit-backdrop-filter: blur(20px);
  border-bottom: 1px solid var(--border);
}
.nav {
  display: flex;
  align-items: center;
  justify-content: space-between;
  height: var(--nav-h);
}
.brand {
  font-family: var(--syne);
  font-size: .92rem;
  font-weight: 700;
  letter-spacing: .01em;
  color: var(--text);
}
.brand:hover { color: var(--teal); }

.nav-links { display: flex; gap: 2.2rem; align-items: center; }
.nav-links a {
  font-family: var(--inter);
  font-size: .82rem;
  font-weight: 400;
  color: var(--text2);
  letter-spacing: .02em;
  transition: color .15s;
}
.nav-links a:hover,
.nav-links a[aria-current="page"] { color: var(--teal); }

/* ── Buttons ── */
.btn {
  display: inline-flex; align-items: center; gap: .4rem;
  padding: .55rem 1.3rem;
  border-radius: 8px;
  font-family: var(--inter);
  font-size: .8rem;
  font-weight: 500;
  border: 1px solid var(--border2);
  background: var(--surface2);
  color: var(--text2);
  cursor: pointer;
  transition: border-color .15s, color .15s, background .15s;
  white-space: nowrap;
}
.btn:hover { border-color: var(--teal); color: var(--teal); background: var(--teal-dim); }
.btn.primary {
  background: var(--teal);
  color: #0b0c10;
  border-color: var(--teal);
  font-weight: 600;
}
.btn.primary:hover { background: #00b891; border-color: #00b891; color: #0b0c10; }

/* ── Hero ── */
.hero {
  min-height: 100vh;
  padding-top: var(--nav-h);
  display: flex;
  align-items: center;
}
.hero-inner {
  width: var(--col);
  margin-inline: auto;
  display: grid;
  grid-template-columns: 1fr 340px;
  gap: 2rem;
  align-items: center;
  padding: 3rem 0 4rem;
}

/* Avatar / photo badge */
.hero-badge {
  display: inline-flex;
  align-items: center;
  gap: .6rem;
  background: var(--surface2);
  border: 1px solid var(--border2);
  border-radius: 100px;
  padding: .35rem .9rem .35rem .45rem;
  margin-bottom: 1.8rem;
}
.hero-avatar {
  width: 28px; height: 28px;
  border-radius: 50%;
  background: var(--teal-dim);
  border: 1px solid var(--teal);
  display: flex; align-items: center; justify-content: center;
  font-family: var(--syne);
  font-size: .65rem;
  font-weight: 700;
  color: var(--teal);
  flex-shrink: 0;
}
.hero-badge-text {
  font-family: var(--mono);
  font-size: .7rem;
  color: var(--text2);
  letter-spacing: .04em;
}
.hero-badge-socials { display: flex; gap: .7rem; margin-left: .4rem; }
.hero-badge-socials a {
  font-family: var(--mono);
  font-size: .68rem;
  color: var(--text3);
  transition: color .15s;
}
.hero-badge-socials a:hover { color: var(--teal); }

.hero h1 {
  font-family: var(--syne);
  font-size: clamp(2.6rem, 5.5vw, 4rem);
  font-weight: 800;
  line-height: 1.08;
  letter-spacing: -.02em;
  color: var(--text);
  margin-bottom: 1.3rem;
}
.hero h1 em {
  font-style: normal;
  color: var(--teal);
}

.hero-sub {
  font-size: .95rem;
  color: var(--text2);
  max-width: 50ch;
  margin-bottom: 2rem;
  line-height: 1.75;
}
.hero-sub strong { color: var(--text); font-weight: 500; }

.hero-cta { display: flex; gap: .7rem; flex-wrap: wrap; margin-bottom: 2.5rem; }

.chips { display: flex; flex-wrap: wrap; gap: .35rem; }
.chip {
  font-family: var(--mono);
  font-size: .65rem;
  letter-spacing: .05em;
  padding: .22rem .65rem;
  border-radius: 100px;
  background: var(--surface2);
  color: var(--text3);
  border: 1px solid var(--border);
}

/* ── Photo card (right column) ── */
.photo-card {
  background: var(--surface);
  border: 1px solid var(--border2);
  border-radius: var(--r-lg);
  overflow: hidden;
  aspect-ratio: 3/4;
  display: flex;
  align-items: center;
  justify-content: center;
  position: relative;
}
.photo-card img {
  width: 100%;
  height: 100%;
  object-fit: cover;
  object-position: top center;
}
.photo-placeholder {
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: .8rem;
  color: var(--text3);
  text-align: center;
  padding: 2rem;
}
.photo-placeholder-icon {
  width: 64px; height: 64px;
  border-radius: 50%;
  background: var(--surface2);
  border: 2px dashed var(--border2);
  display: flex; align-items: center; justify-content: center;
  font-size: 1.4rem;
}
.photo-placeholder p {
  font-family: var(--mono);
  font-size: .7rem;
  letter-spacing: .06em;
  color: var(--text3);
}

/* ── Bottom hero strip ── */
.hero-strip {
  padding: 0 0 4rem;
}
.hero-strip-inner {
  width: var(--col);
  margin-inline: auto;
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 1rem;
}
.strip-card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--r);
  padding: 1.6rem 1.8rem;
  transition: border-color .2s, background .2s;
}
.strip-card:hover { border-color: var(--border2); background: var(--surface2); }
.strip-card-label {
  font-family: var(--mono);
  font-size: .65rem;
  letter-spacing: .14em;
  color: var(--teal);
  text-transform: uppercase;
  margin-bottom: .6rem;
}
.strip-card h3 {
  font-family: var(--syne);
  font-size: 1rem;
  font-weight: 700;
  color: var(--text);
  margin-bottom: .3rem;
}
.strip-card p { font-size: .85rem; color: var(--text2); }

/* ── Sections ── */
.section {
  padding: 5rem 0;
  border-top: 1px solid var(--border);
}
.section-head { margin-bottom: 2.8rem; }
.section-kicker {
  font-family: var(--mono);
  font-size: .68rem;
  letter-spacing: .18em;
  color: var(--teal);
  text-transform: uppercase;
  margin-bottom: .5rem;
}
.section-head h2 {
  font-family: var(--syne);
  font-size: clamp(1.7rem, 3vw, 2.4rem);
  font-weight: 800;
  line-height: 1.1;
  letter-spacing: -.02em;
  color: var(--text);
  margin-bottom: .5rem;
}
.section-head p { font-size: .92rem; color: var(--text2); max-width: 58ch; }

.section-head-row {
  display: flex; justify-content: space-between;
  align-items: flex-end; flex-wrap: wrap; gap: 1rem;
}
.see-more {
  font-family: var(--mono); font-size: .72rem;
  letter-spacing: .08em; color: var(--teal);
  white-space: nowrap;
}
.see-more:hover { opacity: .7; }

/* ── Cards ── */
.card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--r);
  padding: 1.6rem;
  transition: border-color .2s, background .2s;
}
.card:hover { border-color: var(--border2); }

.grid.three {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 1rem;
}

/* ── Project cards ── */
.card.project {
  display: flex; flex-direction: column; gap: .8rem;
  background: var(--surface);
}
.project-top h3 {
  font-family: var(--syne);
  font-size: 1rem;
  font-weight: 700;
  color: var(--text);
  margin-bottom: .2rem;
}
.project-top .muted { font-size: .8rem; color: var(--text2); }
.card.project p { font-size: .85rem; color: var(--text2); flex: 1; }

.meta { display: flex; flex-wrap: wrap; gap: .3rem; }
.tag {
  font-family: var(--mono);
  font-size: .62rem;
  letter-spacing: .06em;
  padding: .15rem .55rem;
  border-radius: 100px;
  background: var(--surface2);
  color: var(--text3);
  border: 1px solid var(--border);
}
.actions { display: flex; gap: .6rem; margin-top: auto; }
.link {
  font-family: var(--mono);
  font-size: .7rem;
  letter-spacing: .06em;
  color: var(--teal);
  transition: opacity .15s;
}
.link:hover { opacity: .7; }

/* ── Publications ── */
.card h3 {
  font-family: var(--mono);
  font-size: .68rem;
  letter-spacing: .14em;
  text-transform: uppercase;
  color: var(--text3);
  margin-bottom: 1rem;
}
.pubs {
  list-style: decimal; padding-left: 1.3rem;
  display: flex; flex-direction: column; gap: 1rem;
}
.pubs li { font-size: .85rem; color: var(--text2); line-height: 1.65; }
.pub-authors { color: var(--text); }
.pub-title { color: var(--text); font-style: italic; }
.pub-title.link-title { color: var(--teal); font-style: italic; }
.pub-venue { color: var(--text2); }

/* ── CV ── */
.cv-top { margin-bottom: 1rem; }
.cv-identity {
  display: flex; justify-content: space-between;
  align-items: center; flex-wrap: wrap; gap: 1rem;
}
.cv-name {
  font-family: var(--syne);
  font-size: 1.4rem;
  font-weight: 700;
  margin-bottom: .2rem;
}
.cv-line { font-size: .85rem; color: var(--text2); }
.cv-actions { display: flex; gap: .5rem; flex-wrap: wrap; }

.cv-accordion { display: flex; flex-direction: column; gap: .5rem; }
.cv-item {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--r-sm);
  overflow: hidden;
  transition: border-color .2s;
}
.cv-item[open] { border-color: var(--border2); }
.cv-item summary {
  display: flex; justify-content: space-between; align-items: center;
  padding: 1rem 1.4rem;
  cursor: pointer; list-style: none; user-select: none;
  transition: background .15s;
}
.cv-item summary:hover { background: var(--surface2); }
.cv-item summary::-webkit-details-marker { display: none; }
.cv-title {
  font-family: var(--syne);
  font-size: .82rem;
  font-weight: 600;
  letter-spacing: .04em;
  color: var(--text);
}
.cv-chev { color: var(--text3); font-size: .9rem; transition: transform .2s; }
.cv-item[open] .cv-chev { transform: rotate(180deg); }
.cv-content {
  padding: 1.2rem 1.4rem 1.4rem;
  border-top: 1px solid var(--border);
  display: flex; flex-direction: column; gap: 1.2rem;
}
.cv-entry { display: flex; flex-direction: column; gap: .4rem; }
.cv-entry-head {
  display: flex; justify-content: space-between;
  align-items: baseline; flex-wrap: wrap; gap: .4rem;
  font-size: .88rem;
}
.cv-entry-head strong { color: var(--text); font-weight: 500; }
.cv-entry-head .muted {
  font-family: var(--mono); font-size: .7rem;
  letter-spacing: .06em; color: var(--text2);
}
.cv-sub { font-size: .82rem; color: var(--text2); }
.cv-subhead {
  font-family: var(--mono); font-size: .65rem;
  letter-spacing: .14em; text-transform: uppercase;
  color: var(--teal); margin-bottom: .4rem;
}
.cv-split { display: grid; grid-template-columns: 1fr 1fr; gap: 1.2rem; }
.bullets {
  list-style: disc; padding-left: 1.2rem;
  display: flex; flex-direction: column; gap: .25rem;
}
.bullets li { font-size: .84rem; color: var(--text2); }

/* ── Contact ── */
.contact-card { display: flex; flex-direction: column; gap: 1.4rem; }
.contact-email { font-family: var(--syne); font-size: 1.5rem; font-weight: 700; }
.contact-email a { color: var(--text); transition: color .15s; }
.contact-email a:hover { color: var(--teal); }
.contact-buttons { display: flex; flex-wrap: wrap; gap: .5rem; }
.social-btn {
  display: inline-flex; align-items: center;
  padding: .4rem .9rem;
  border-radius: 8px;
  border: 1px solid var(--border2);
  background: var(--surface2);
  font-family: var(--mono);
  font-size: .7rem;
  letter-spacing: .06em;
  color: var(--text2);
  transition: border-color .15s, color .15s, background .15s;
}
.social-btn:hover { border-color: var(--teal); color: var(--teal); background: var(--teal-dim); }

/* ── Projects page controls ── */
.projects-controls {
  display: flex; gap: .6rem; margin-top: 2rem; justify-content: center;
}

/* ── Footer ── */
.footer {
  margin-top: 3rem; padding-top: 1.5rem;
  border-top: 1px solid var(--border);
  font-family: var(--mono);
  font-size: .7rem; letter-spacing: .06em;
  color: var(--text3);
}

/* ══════════════════════════════════════════════
   PERSONAL PAGE  (personal.html)
   ══════════════════════════════════════════════ */

.personal-hero {
  padding-top: calc(var(--nav-h) + 3rem);
  padding-bottom: 3rem;
  border-bottom: 1px solid var(--border);
}
.personal-hero h1 {
  font-family: var(--syne);
  font-size: clamp(2rem, 4vw, 3rem);
  font-weight: 800;
  letter-spacing: -.02em;
  color: var(--text);
  margin-bottom: .6rem;
}
.personal-hero p { font-size: .95rem; color: var(--text2); max-width: 60ch; }

/* Day cards grid */
.day-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(290px, 1fr));
  gap: 1rem;
  padding: 3rem 0;
}

.day-card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--r);
  overflow: hidden;
  display: flex;
  flex-direction: column;
  transition: border-color .2s, transform .2s;
  cursor: pointer;
}
.day-card:hover { border-color: var(--teal); transform: translateY(-2px); }
.day-card.rest-card { opacity: .5; cursor: default; }
.day-card.rest-card:hover { transform: none; border-color: var(--border); }

.day-card-header {
  padding: 1.1rem 1.3rem .8rem;
  display: flex;
  justify-content: space-between;
  align-items: flex-start;
  border-bottom: 1px solid var(--border);
}
.day-card-day {
  font-family: var(--syne);
  font-size: 1.4rem;
  font-weight: 800;
  letter-spacing: -.01em;
  color: var(--text);
  line-height: 1;
}
.day-card-date-sub {
  font-family: var(--mono);
  font-size: .62rem;
  letter-spacing: .1em;
  color: var(--text3);
  margin-top: .2rem;
}
.day-card-tag {
  font-family: var(--mono);
  font-size: .62rem;
  letter-spacing: .1em;
  padding: .2rem .65rem;
  border-radius: 100px;
  background: var(--teal-dim);
  color: var(--teal);
  border: 1px solid rgba(0,200,160,.25);
  white-space: nowrap;
  align-self: flex-start;
}
.day-card-tag.rest { background: var(--surface2); color: var(--text3); border-color: var(--border); }

.day-card-body {
  padding: 1rem 1.3rem;
  flex: 1;
  display: flex;
  flex-direction: column;
  gap: .8rem;
}
.day-card-focus {
  font-family: var(--syne);
  font-size: .88rem;
  font-weight: 700;
  color: var(--text);
  line-height: 1.3;
}
.day-card-goal {
  font-size: .78rem;
  color: var(--text2);
}
.day-card-run {
  display: inline-flex;
  align-items: center;
  gap: .4rem;
  font-family: var(--mono);
  font-size: .68rem;
  letter-spacing: .08em;
  color: var(--teal);
  background: var(--teal-dim);
  border: 1px solid rgba(0,200,160,.2);
  border-radius: 6px;
  padding: .25rem .65rem;
  align-self: flex-start;
}

/* Block list inside expanded day card */
.day-card-blocks { display: flex; flex-direction: column; gap: .35rem; }
.block-pill {
  display: flex;
  align-items: center;
  gap: .6rem;
  padding: .45rem .7rem;
  border-radius: 8px;
  background: var(--surface2);
  border: 1px solid var(--border);
}
.block-pill-dot {
  width: 6px; height: 6px;
  border-radius: 50%;
  flex-shrink: 0;
}
.dot-warmup  { background: var(--text3); }
.dot-main    { background: var(--teal); }
.dot-core    { background: #e05c5c; }

.block-pill-name {
  font-size: .78rem;
  color: var(--text2);
  flex: 1;
}
.block-pill-dur {
  font-family: var(--mono);
  font-size: .62rem;
  color: var(--text3);
  letter-spacing: .06em;
}

/* Modal overlay */
.modal-overlay {
  position: fixed; inset: 0; z-index: 500;
  background: rgba(11,12,16,.88);
  backdrop-filter: blur(12px);
  display: flex; align-items: center; justify-content: center;
  padding: 1rem;
  opacity: 0; pointer-events: none;
  transition: opacity .25s;
}
.modal-overlay.open { opacity: 1; pointer-events: all; }

.modal {
  background: var(--surface);
  border: 1px solid var(--border2);
  border-radius: var(--r-lg);
  width: 100%; max-width: 720px;
  max-height: 88vh;
  overflow-y: auto;
  transform: translateY(16px);
  transition: transform .25s;
}
.modal-overlay.open .modal { transform: translateY(0); }

.modal-header {
  padding: 1.4rem 1.6rem 1rem;
  border-bottom: 1px solid var(--border);
  position: sticky; top: 0;
  background: var(--surface);
  z-index: 1;
  display: flex; justify-content: space-between; align-items: flex-start;
}
.modal-close {
  background: var(--surface2); border: 1px solid var(--border2);
  border-radius: 8px; padding: .3rem .7rem;
  font-family: var(--mono); font-size: .7rem;
  color: var(--text2); cursor: pointer;
  transition: border-color .15s, color .15s;
}
.modal-close:hover { border-color: var(--teal); color: var(--teal); }

.modal-body { padding: 1.4rem 1.6rem; display: flex; flex-direction: column; gap: 1rem; }

/* Block accordion in modal */
.modal-block {
  background: var(--surface2);
  border: 1px solid var(--border);
  border-radius: var(--r-sm);
  overflow: hidden;
}
.modal-block summary {
  display: flex; justify-content: space-between; align-items: center;
  padding: .8rem 1rem;
  cursor: pointer; list-style: none; user-select: none;
  transition: background .15s;
}
.modal-block summary:hover { background: var(--surface3); }
.modal-block summary::-webkit-details-marker { display: none; }
.modal-block-name {
  display: flex; align-items: center; gap: .6rem;
  font-family: var(--syne); font-size: .8rem; font-weight: 600; color: var(--text);
}
.modal-block-dur {
  font-family: var(--mono); font-size: .65rem; color: var(--text3);
  letter-spacing: .06em; margin-left: .5rem;
}
.modal-chev { color: var(--text3); font-size: .8rem; transition: transform .2s; }
.modal-block[open] .modal-chev { transform: rotate(180deg); }

.ex-table { border-top: 1px solid var(--border); }
.ex-head {
  display: grid;
  grid-template-columns: 1fr 48px 100px 1fr;
  gap: .5rem; padding: .45rem 1rem;
  background: var(--bg2);
}
.ex-head span {
  font-family: var(--mono); font-size: .58rem;
  letter-spacing: .16em; color: var(--muted); text-transform: uppercase;
}
.ex-row {
  display: grid;
  grid-template-columns: 1fr 48px 100px 1fr;
  gap: .5rem; padding: .75rem 1rem;
  border-top: 1px solid var(--border);
  transition: background .12s;
}
.ex-row:hover { background: rgba(255,255,255,.02); }
.ex-name { font-size: .84rem; color: var(--text); font-weight: 500; line-height: 1.3; }
.ex-sets { font-family: var(--mono); font-size: .84rem; color: var(--teal); font-weight: 500; }
.ex-sets-core { color: #e05c5c; }
.ex-reps { font-size: .78rem; color: var(--text2); line-height: 1.4; }
.ex-notes { font-size: .74rem; color: var(--text3); line-height: 1.45; }

/* ── Responsive ── */
@media (max-width: 900px) {
  .hero-inner { grid-template-columns: 1fr; }
  .photo-card { display: none; }
  .hero-strip-inner { grid-template-columns: 1fr; }
  .grid.three { grid-template-columns: repeat(2, 1fr); }
  .cv-split { grid-template-columns: 1fr; }
  .ex-head, .ex-row { grid-template-columns: 1fr 44px 90px; }
  .ex-notes { display: none; }
  .day-grid { grid-template-columns: repeat(2, 1fr); }
}
@media (max-width: 560px) {
  .grid.three { grid-template-columns: 1fr; }
  .nav-links { gap: 1.2rem; }
  .nav-links a { font-size: .75rem; }
  .day-grid { grid-template-columns: 1fr; }
  .ex-head, .ex-row { grid-template-columns: 1fr 44px; }
  .ex-reps { display: none; }
}

  </style>
</head>

<body>
  <header class="site-header">
    <div class="container">
      <nav class="nav">
        <a class="brand" href="index.html">Alejandro Medina</a>
        <div class="nav-links">
          <a href="projects.html" aria-current="page">Projects</a>
          <a href="cv.html">CV</a>
          <a href="personal.html">Personal</a>
          <a href="index.html#contact">Contact</a>
        </div>
      </nav>
    </div>
  </header>

  <main>
    <section class="section" style="padding-top:calc(var(--nav-h) + 3rem);">
      <div class="container">

        <div class="section-head">
          <p class="section-kicker">Work</p>
          <h2>Projects</h2>
          <p>All projects, organized as a browsable grid.</p>
        </div>

        <div id="projectsGrid" class="grid three"></div>

        <div class="projects-controls">
          <button id="loadMoreBtn" class="btn primary" type="button">Load more</button>
          <button id="showLessBtn" class="btn" type="button">Show less</button>
        </div>

        <footer class="footer">
          <p>© <span id="year"></span> Alejandro Medina.</p>
        </footer>

      </div>
    </section>
  </main>

  <script>
    const PROJECTS = [
      { title: 'MAS-QD', subtitle: 'Multi-Archive Scheduling for Robust Illumination', desc: 'A scheduler coordinating multiple archives and emitters to improve illumination robustness across complementary descriptor views.', tags: ['QD', 'Scheduling', 'Multi-View'] },
      { title: 'QD Motif Discovery', subtitle: 'Illuminating DNA motif hypothesis spaces', desc: 'Framing DNA motif discovery as a quality-diversity problem to recover multiple high-quality motif hypotheses, compared against standard tools under matched criteria.', tags: ['Bioinformatics', 'MAP-Elites', 'Interpretation'] },
      { title: 'Illuminating Recommendation Spaces', subtitle: 'QD perspective on recommender trade-offs', desc: 'Using illumination algorithms to map diverse, high-performing recommendation policies and characterize accuracy–diversity–fairness trade-offs.', tags: ['Recsys', 'QD', 'Trade-offs'] },
      { title: 'Human-in-the-Loop Archive Exploration', subtitle: 'Interactive querying for scientific interpretation', desc: 'UI and interaction primitives for exploring QD archives (slicing, annotation, comparisons) to support scientific and design interpretation.', tags: ['HCI', 'Visualization', 'QD'] },
      { title: 'Alcohol Consumption Phenotyping', subtitle: 'Predictive modeling of behavioral trajectories', desc: 'ML analysis of alcohol-intake trajectory classifications in nonhuman primates, evaluating stability and predictive validity across modeling approaches.', tags: ['ML', 'Time Series', 'Bio'] },
      { title: 'Minecraft Flying Machines', subtitle: "Quality-Diversity for creative AI — GECCO '23", desc: 'MAP-Elites-based algorithms for evolving flying machines in Minecraft with custom behavioral descriptors. Published at GECCO \'23.', tags: ['GECCO', 'QD', 'Creative AI'], links: [{ label: 'Paper →', href: 'https://dl.acm.org/doi/10.1145/3583131.3590352' }] },
      { title: 'Dial-a-Ride Problem', subtitle: 'Evaluating an earliest deadline first algorithm', desc: 'Algorithmic benchmark and comparison between various existing scheduling algorithms and an earliest deadline first approach (EDF).', tags: ['Algorithms', 'Benchmark'], links: [{ label: 'Code →', href: 'https://github.com/alejmedinajr/ImplementingEDF' }] },
      { title: 'US Doodle Polls', subtitle: 'Cooperative polls study on priority in scheduling', desc: 'Python analysis on trends in sincerity in a human study across the US when considering self, team, or job.', tags: ['Analysis', 'Doodle Polls'], links: [{ label: 'Paper →', href: 'https://link.springer.com/chapter/10.1007/978-3-031-16538-2_4' }] },
    ];

    const PAGE_SIZE = 9;
    let visibleCount = PAGE_SIZE;
    const grid = document.getElementById('projectsGrid');
    const loadMoreBtn = document.getElementById('loadMoreBtn');
    const showLessBtn = document.getElementById('showLessBtn');

    function cardHTML(p) {
      const tags  = (p.tags  || []).map(t => `<span class="tag">${t}</span>`).join('');
      const links = (p.links || []).map(l => `<a class="link" href="${l.href}" target="_blank" rel="noreferrer">${l.label}</a>`).join('');
      return `
        <article class="card project">
          <div class="project-top">
            <h3>${p.title}</h3>
            ${p.subtitle ? `<p class="muted">${p.subtitle}</p>` : ''}
          </div>
          <p>${p.desc || ''}</p>
          <div class="meta">${tags}</div>
          <div class="actions">${links}</div>
        </article>
      `;
    }

    function render() {
      grid.innerHTML = PROJECTS.slice(0, visibleCount).map(cardHTML).join('');
      loadMoreBtn.style.display = visibleCount < PROJECTS.length ? 'inline-flex' : 'none';
      showLessBtn.style.display = visibleCount > PAGE_SIZE      ? 'inline-flex' : 'none';
    }

    loadMoreBtn.addEventListener('click', () => { visibleCount = Math.min(visibleCount + PAGE_SIZE, PROJECTS.length); render(); });
    showLessBtn.addEventListener('click', () => { visibleCount = PAGE_SIZE; render(); grid.scrollIntoView({ behavior: 'smooth', block: 'start' }); });

    document.getElementById('year').textContent = new Date().getFullYear();
    render();
  </script>
</body>
</html>
